name: Deploy to Firebase

on:
  push:
    branches:
      - main

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies (Frontend)
        run: npm ci

      - name: Install dependencies (Backend)
        run: npm ci --prefix functions

      - name: Enable webframeworks experiment
        run: npx firebase-tools@13 experiments:enable webframeworks --token "$FIREBASE_TOKEN"
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}

      - name: Deploy to Firebase
        run: npx firebase-tools@13 deploy --token "$FIREBASE_TOKEN" -m "Automated deployment from GitHub Actions" --non-interactive
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
